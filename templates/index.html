<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CO2 Monitor</title>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Left Panel (Sidebar on Desktop, Top Section on Mobile) -->
    <div class="header-section">
        <!-- Room Selector & Brand Header -->
        <div class="brand-row">
            <button class="menu-btn" id="menuBtn" aria-label="Rooms">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="brand-info">
                <h1 class="brand-title" id="currentRoomName">Living Room</h1>
                <span class="brand-subtitle" id="lastSeenTime">Last check-in: --</span>
            </div>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span id="statusLabel" class="status-label">Online</span>
            </div>
        </div>

        <!-- Stats Grid (CO2, Temp, Hum, Pressure) -->
        <div class="stats-grid">
            <!-- CO2 Card -->
            <div class="card" id="cardCo2">
                <h2>CO2</h2>
                <div class="value-row">
                    <span id="val-co2" class="value">--</span>
                    <span class="unit">PPM</span>
                </div>
                <div id="trend-co2" class="trend">--</div>
                <div id="pred-co2" class="prediction">Calc...</div>
            </div>

            <!-- Temperature Card -->
            <div class="card" id="cardTemp">
                <h2>TEMP</h2>
                <div class="value-row">
                    <span id="val-temp" class="value" style="color: #4da6ff;">--</span>
                    <span class="unit">°C</span>
                </div>
                <div id="trend-temp" class="trend">--</div>
            </div>

            <!-- Humidity Card -->
            <div class="card" id="cardHum">
                <h2>HUM</h2>
                <div class="value-row">
                    <span id="val-hum" class="value" style="color: #4dff88;">--</span>
                    <span class="unit">%</span>
                </div>
                <div id="trend-hum" class="trend">--</div>
            </div>

            <!-- Pressure Card -->
            <div class="card" id="cardPress">
                <h2>PRESSURE</h2>
                <div class="value-row">
                    <span id="val-press" class="value" style="color: #ffb84d;">--</span>
                    <span class="unit">hPa</span>
                </div>
                <div id="trend-press" class="trend">--</div>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="controls-area">
            <!-- Time Ranges Row -->
            <div class="time-row">
                <button class="btn-time active" data-minutes="60">1H</button>
                <button class="btn-time" data-minutes="1440">1D</button>
                <button class="btn-time" data-minutes="10080">1W</button>
                <button class="btn-time" data-minutes="43200">1M</button>
                <button class="btn-time" data-minutes="0">ALL</button>
            </div>
        </div>
    </div>

    <!-- Right Panel (Graph Section - Fills remaining space) -->
    <div class="graph-section">
        <div class="chart-header-row">
            <div class="metric-selector" id="metricSelector">
                <button class="btn-metric active" data-metric="co2">CO2</button>
                <button class="btn-metric" data-metric="temp">Temp</button>
                <button class="btn-metric" data-metric="hum">Hum</button>
                <button class="btn-metric" data-metric="pressure">Pressure</button>
            </div>
            <label class="smooth-toggle">
                <input type="checkbox" id="chkSmooth">
                <span class="smooth-label">Smooth</span>
            </label>
        </div>
        <div id="chart"></div>
        <div class="chart-loader" id="chartLoader">
            <span class="loader-spinner"></span>
        </div>
    </div>

    <!-- Sliding Room Drawer (Slides in from Left) -->
    <div class="room-drawer" id="roomDrawer">
        <div class="drawer-header">
            <h3>Select Room</h3>
            <button class="close-drawer-btn" id="closeDrawerBtn">&times;</button>
        </div>
        <div class="drawer-body" id="roomList">
            <!-- Dynamically populated room items -->
        </div>
        <div class="drawer-footer">
            <div class="action-row">
                <a href="#" id="btnExport" class="btn-action btn-csv">Export CSV</a>
                <button id="btnReset" class="btn-action btn-reset">Delete Room</button>
            </div>
        </div>
    </div>
    <!-- Drawer Overlay -->
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- Calibration Modal -->
    <div class="modal" id="calibrationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="calModalTitle">Calibrate Sensor</h3>
                <button class="modal-close" id="calModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="calName">Room Name</label>
                    <input type="text" id="calName" placeholder="e.g. Living Room">
                </div>
                <div class="form-group">
                    <label for="calTemp">Temperature Offset (°C)</label>
                    <input type="number" id="calTemp" step="0.1" value="0.0">
                </div>
                <div class="form-group">
                    <label for="calHum">Humidity Offset (%)</label>
                    <input type="number" id="calHum" step="1" value="0.0">
                </div>
                <div class="form-group">
                    <label for="calPress">Pressure Offset (hPa)</label>
                    <input type="number" id="calPress" step="1" value="0.0">
                </div>
                <div class="form-group">
                    <label for="calCo2">CO2 Offset (ppm)</label>
                    <input type="number" id="calCo2" step="5" value="0.0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" id="calModalCancel">Cancel</button>
                <button class="btn-modal btn-save" id="calModalSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="/static/js/app.js"></script>
</body>
</html>
