<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CO2 Monitor</title>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Left Panel (Sidebar on Desktop, Top Section on Mobile) -->
    <div class="header-section">
        <!-- Room Selector & Brand Header -->
        <div class="brand-row">
            <button class="menu-btn" id="menuBtn" aria-label="Rooms">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1 class="brand-title" id="currentRoomName">Living Room</h1>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
            </div>
        </div>

        <!-- Stats Grid (CO2, Temp, Hum, Pressure) -->
        <div class="stats-grid">
            <!-- CO2 Card -->
            <div class="card" id="cardCo2">
                <h2>CO2</h2>
                <div class="value-row">
                    <span id="val-co2" class="value">--</span>
                    <span class="unit">PPM</span>
                </div>
                <div id="trend-co2" class="trend">--</div>
                <div id="pred-co2" class="prediction">Calc...</div>
            </div>

            <!-- Temperature Card -->
            <div class="card" id="cardTemp">
                <h2>TEMP</h2>
                <div class="value-row">
                    <span id="val-temp" class="value" style="color: #4da6ff;">--</span>
                    <span class="unit">°C</span>
                </div>
                <div id="trend-temp" class="trend">--</div>
            </div>

            <!-- Humidity Card -->
            <div class="card" id="cardHum">
                <h2>HUM</h2>
                <div class="value-row">
                    <span id="val-hum" class="value" style="color: #4dff88;">--</span>
                    <span class="unit">%</span>
                </div>
                <div id="trend-hum" class="trend">--</div>
            </div>

            <!-- Pressure Card -->
            <div class="card" id="cardPress">
                <h2>PRESSURE</h2>
                <div class="value-row">
                    <span id="val-press" class="value" style="color: #ffb84d;">--</span>
                    <span class="unit">hPa</span>
                </div>
                <div id="trend-press" class="trend">--</div>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="controls-area">
            <!-- Time Ranges Row -->
            <div class="time-row">
                <button class="btn-time" data-minutes="15">15m</button>
                <button class="btn-time" data-minutes="60">1h</button>
                <button class="btn-time" data-minutes="360">6h</button>
                <button class="btn-time" data-minutes="1440">24h</button>
                <button class="btn-time active" data-minutes="0">All</button>
            </div>

            <!-- Bottom Settings Card -->
            <div class="bottom-controls">
                <div class="slider-wrapper">
                    <span class="slider-label" id="interval-display">60s</span>
                    <input type="range" id="interval-slider" min="5" max="600" value="60" step="5">
                </div>
                <div class="action-row">
                    <a href="#" id="btnExport" class="btn-action btn-csv">CSV</a>
                    <button id="btnReset" class="btn-action btn-reset">Reset History</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Panel (Graph Section - Fills remaining space) -->
    <div class="graph-section">
        <div class="chart-header-row">
            <div class="metric-selector" id="metricSelector">
                <button class="btn-metric active" data-metric="co2">CO2</button>
                <button class="btn-metric" data-metric="temp">Temp</button>
                <button class="btn-metric" data-metric="hum">Hum</button>
                <button class="btn-metric" data-metric="pressure">Pressure</button>
            </div>
        </div>
        <div id="chart"></div>
        <div class="chart-loader" id="chartLoader">
            <span class="loader-spinner"></span>
        </div>
    </div>

    <!-- Sliding Room Drawer (Slides in from Left) -->
    <div class="room-drawer" id="roomDrawer">
        <div class="drawer-header">
            <h3>Select Room</h3>
            <button class="close-drawer-btn" id="closeDrawerBtn">&times;</button>
        </div>
        <div class="drawer-body" id="roomList">
            <!-- Dynamically populated room items -->
        </div>
    </div>
    <!-- Drawer Overlay -->
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- Script -->
    <script src="/static/js/app.js"></script>
</body>
</html>
